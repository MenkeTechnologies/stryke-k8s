[package]
name = "stryke-k8s"
version = "0.19.0"
description = "Kubernetes client for stryke. Get / apply / delete / scale / logs against any kubeconfig-reachable cluster. cdylib loaded in-process — persistent kube::Client cache across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-k8s"
edition = "2026"

[ffi]
lib-name = "stryke_k8s"
namespace = "K8s"
exports = [
    "k8s__pkg_version",
    "k8s__version",
    "k8s__ping",
    "k8s__contexts",
    "k8s__current_context",
    "k8s__namespaces",
    "k8s__api_resources",
    "k8s__get",
    "k8s__get_one",
    "k8s__create",
    "k8s__replace",
    "k8s__apply",
    "k8s__patch",
    "k8s__delete",
    "k8s__scale",
    "k8s__logs",
    "k8s__label",
    "k8s__annotate",
    "k8s__cordon",
    "k8s__uncordon",
    "k8s__set_image",
    "k8s__rollout_restart",
    "k8s__rollout_status",
    "k8s__events",
    "k8s__top_pods",
    "k8s__top_nodes",
    "k8s__evict",
    "k8s__wait",
    "k8s__rollout_history",
    "k8s__autoscale",
    "k8s__taint",
    "k8s__valid_name",
    "k8s__valid_label_value",
    "k8s__valid_label_key",
    "k8s__parse_selector",
    "k8s__build_selector",
    "k8s__parse_field_selector",
    "k8s__build_field_selector",
    "k8s__selector_matches",
    "k8s__field_selector_matches",
    "k8s__parse_resource_ref",
    "k8s__build_resource_ref",
    "k8s__parse_api_version",
    "k8s__build_api_version",
    "k8s__parse_quantity",
    "k8s__compare_quantity",
    "k8s__format_quantity",
    "k8s__sum_quantities",
    "k8s__sub_quantity",
    "k8s__scale_quantity",
    "k8s__nodes",
    "k8s__exists",
    "k8s__delete_collection",
    "k8s__get_yaml",
    "k8s__parse_gvk",
    "k8s__build_gvk",
    "k8s__parse_image_ref",
    "k8s__build_image_ref",
    "k8s__resource_ratio",
    "k8s__pod_status",
    "k8s__owner_refs",
    "k8s__diff_merge_patch",
    "k8s__drain_filter",
    "k8s__raw",
    "k8s__healthz",
    "k8s__get_scale",
    "k8s__normalize_quantity",
    "k8s__container_images",
    "k8s__condition",
    "k8s__age_seconds",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
