[package]
name = "stryke-k8s"
version = "0.4.0"
description = "Kubernetes client for stryke. Get / apply / delete / scale / logs against any kubeconfig-reachable cluster. cdylib loaded in-process — persistent kube::Client cache across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-k8s"
edition = "2026"

[ffi]
lib-name = "stryke_k8s"
namespace = "K8s"
exports = [
    "k8s__pkg_version",
    "k8s__version",
    "k8s__ping",
    "k8s__contexts",
    "k8s__current_context",
    "k8s__namespaces",
    "k8s__api_resources",
    "k8s__get",
    "k8s__get_one",
    "k8s__create",
    "k8s__replace",
    "k8s__apply",
    "k8s__patch",
    "k8s__delete",
    "k8s__scale",
    "k8s__logs",
    "k8s__label",
    "k8s__annotate",
    "k8s__cordon",
    "k8s__uncordon",
    "k8s__set_image",
    "k8s__rollout_restart",
    "k8s__rollout_status",
    "k8s__events",
    "k8s__top_pods",
    "k8s__top_nodes",
    "k8s__evict",
    "k8s__wait",
    "k8s__rollout_history",
    "k8s__autoscale",
    "k8s__taint",
    "k8s__valid_name",
    "k8s__parse_selector",
    "k8s__parse_resource_ref",
    "k8s__parse_quantity",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
